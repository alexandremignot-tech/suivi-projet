services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: suivi
      POSTGRES_PASSWORD: suivi
      POSTGRES_DB: suivi_projet
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suivi"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://suivi:suivi@db:5432/suivi_projet?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-secret}
      PORT: 4000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      AUTO_LOGIN: ${AUTO_LOGIN:-true}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:4000/api/integrations/google/callback}
      ODOO_URL: ${ODOO_URL:-}
      ODOO_DB: ${ODOO_DB:-}
      ODOO_USERNAME: ${ODOO_USERNAME:-}
      ODOO_API_KEY: ${ODOO_API_KEY:-}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  db_data:
  uploads_data:
